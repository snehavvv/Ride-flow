databases:
  - name: rideflow-db
    databaseName: rideflow_db
    user: rideflow_user
    plan: free

services:
  - type: web
    name: rideflow-backend
    env: python
    rootDir: rideflow-backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rideflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.10.12"
